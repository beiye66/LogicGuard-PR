name: CI

# 每次推送到 main、以及任何针对仓库的 Pull Request，都会触发本流水线。
# 作用：保证主分支与每个 PR 的代码都能通过语法检查与单元测试，使 main 始终可运行。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 语法编译检查（确保源码可被正常加载）
        run: python -m compileall src

      - name: 运行单元测试
        run: pytest -v
