name: AI PR Review

# 触发时机：PR 打开 / 重开 / 每次推送新 commit（synchronize）。
on:
  pull_request:
    types: [opened, reopened, synchronize]

# 内置 GITHUB_TOKEN 需要对 PR 评论有写权限。
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行 AI 审查
        env:
          # 内置 token，用于抓取 PR diff 与发布评论（受上面的 permissions 约束）。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # LLM 凭证（密钥）：在仓库 Settings → Secrets → Actions 中配置 LLM_API_KEY。
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # LLM 接口地址与模型（非密钥）：在仓库 Settings → Variables → Actions 中配置。
          # 例如 Gemini：LLM_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai/
          #             LLM_MODEL=gemini-2.5-flash
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          # 当前仓库与 PR 号由 Actions 上下文注入。
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python src/main.py
