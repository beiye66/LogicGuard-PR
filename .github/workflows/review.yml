name: AI PR Review

# 触发时机：PR 打开 / 重开 / 每次推送新 commit（synchronize）。
on:
  pull_request:
    types: [opened, reopened, synchronize]

# 内置 GITHUB_TOKEN 需要对 PR 评论有写权限。
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # 检出代码，使本仓库根目录的复用 Action（./）可用。
      - name: 检出代码
        uses: actions/checkout@v4

      # 直接复用本仓库自带的 Autonomous PR Reviewer Action（dogfooding：
      # 这与外部用户 `uses: beiye66/LogicGuard-PR@main` 的用法完全一致）。
      - name: 运行 AI 审查
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          llm-base-url: ${{ vars.LLM_BASE_URL }}
          llm-model: ${{ vars.LLM_MODEL }}
          llm-provider: ${{ vars.LLM_PROVIDER }}
